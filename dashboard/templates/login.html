<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FishID | Login</title>
  <link rel="icon" type="image/png" href="/static/img/icon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/1.20.3/TweenMax.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }

    #bg-wrap {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    #bg-wrap svg {
      width: 100%;
      height: 100%;
    }

    .login-wrapper {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 14px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }
    .login-logo { text-align: center; margin-bottom: 24px; }
    .login-logo h5 { font-weight: 700; margin-top: 8px; color: #212529; }
    .login-logo p  { font-size: 0.82rem; color: #6c757d; margin: 0; }
    .form-label    { font-size: 0.82rem; font-weight: 500; color: #495057; }
    .btn-login     { font-weight: 500; }
    .input-group-text { background: #f8f9fa; border-right: 0; color: #adb5bd; }
    .form-control  { border-left: 0; }
    .form-control:focus { box-shadow: none; border-color: #ced4da; }
    .input-group:focus-within .input-group-text { border-color: #86b7fe; color: #0d6efd; }
  </style>
</head>
<body>

<!-- Underwater gradient background with bubbles only -->
<div id="bg-wrap">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 846.5 598.5" preserveAspectRatio="xMidYMid slice">
    <defs>
      <radialGradient id="bg" cx="309.25" cy="567" r="780" gradientTransform="matrix(1 0 0 -1 0 600)" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#BBE2EE"/>
        <stop offset=".52" stop-color="#415DA8"/>
        <stop offset="1" stop-color="#26225B"/>
      </radialGradient>
    </defs>
    <!-- Background -->
    <rect width="846.5" height="598.5" fill="url(#bg)"/>
    <!-- Wave overlay -->
    <path fill="rgba(255,255,255,0.07)" d="M657.3 417.8c-28.5 2.5-61.5 8.4-99 17.7-17.4 4.3-51.6 13.7-102.5 28.2-44.1 12.5-79.6 21.7-106.6 27.5-40.1 8.7-77.1 14-111.1 15.9-84.5 4.7-163.9-11.3-238-48V19.9c21.7 44 47.1 84.4 76.2 121.2 28.7 36.2 60.1 67.8 94.3 94.8 34.3 27 70.2 48.5 107.7 64.4 38.2 16.1 77 26 116.2 29.6 83.6 7.7 163-12.6 238.3-61C715.1 216 786.3 155 846.6 85.9V459c-29.3-18.2-60.4-30.5-93.3-37-29.5-5.8-61.4-7.2-96-4.2z"/>
    <!-- Bubbles -->
    <g id="bubble1"><circle fill="rgba(255,255,255,0.12)" cx="786" cy="580" r="17"/><circle fill="rgba(255,255,255,0.2)" cx="783" cy="573" r="7"/></g>
    <g id="bubble2"><circle fill="rgba(255,255,255,0.12)" cx="826" cy="598" r="25"/><circle fill="rgba(255,255,255,0.18)" cx="822" cy="588" r="10"/></g>
    <g id="bubble3"><circle fill="rgba(255,255,255,0.12)" cx="120" cy="598" r="21"/><circle fill="rgba(255,255,255,0.18)" cx="117" cy="588" r="8"/></g>
    <g id="bubble4"><circle fill="rgba(255,255,255,0.12)" cx="300" cy="598" r="25"/><circle fill="rgba(255,255,255,0.16)" cx="296" cy="587" r="10"/></g>
    <g id="bubble5"><circle fill="rgba(255,255,255,0.12)" cx="500" cy="598" r="24"/><circle fill="rgba(255,255,255,0.15)" cx="496" cy="588" r="10"/></g>
    <g id="bubble6"><circle fill="rgba(255,255,255,0.12)" cx="60" cy="598" r="19"/><circle fill="rgba(255,255,255,0.14)" cx="57" cy="590" r="7"/></g>
    <g id="bubble7"><circle fill="rgba(255,255,255,0.12)" cx="200" cy="598" r="23"/><circle fill="rgba(255,255,255,0.16)" cx="197" cy="589" r="9"/></g>
    <g id="bubble8"><circle fill="rgba(255,255,255,0.12)" cx="420" cy="598" r="23"/><circle fill="rgba(255,255,255,0.15)" cx="417" cy="589" r="9"/></g>
    <g id="bubble9"><circle fill="rgba(255,255,255,0.12)" cx="650" cy="598" r="25"/><circle fill="rgba(255,255,255,0.14)" cx="647" cy="588" r="10"/></g>
    <g id="bubble10"><circle fill="rgba(255,255,255,0.12)" cx="700" cy="598" r="19"/><circle fill="rgba(255,255,255,0.13)" cx="697" cy="590" r="7"/></g>
  </svg>
</div>

<!-- Login Form -->
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-logo">
      <img src="/static/img/icon.png" alt="FishID" style="width:56px;height:56px;object-fit:contain;">
      <h5>FishID</h5>
      <p>Sistem Klasifikasi Ikan</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small">
      <i class="fa-solid fa-circle-exclamation me-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-user fa-sm"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Username" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fa-solid fa-lock fa-sm"></i></span>
          <input type="password" name="password" id="passwordInput" class="form-control" placeholder="Password" required>
          <button type="button" class="input-group-text border-start-0 bg-white" id="togglePassword" style="cursor:pointer;">
            <i class="fa-solid fa-eye fa-sm text-muted" id="toggleIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-login">
        <i class="fa-solid fa-right-to-bracket me-1"></i> Masuk
      </button>
    </form>
  </div>
</div>

<script>
// Show/hide password
document.getElementById("togglePassword").addEventListener("click", function() {
  const input = document.getElementById("passwordInput");
  const icon  = document.getElementById("toggleIcon");
  if (input.type === "password") {
    input.type = "text";
    icon.className = "fa-solid fa-eye-slash fa-sm text-muted";
  } else {
    input.type = "password";
    icon.className = "fa-solid fa-eye fa-sm text-muted";
  }
});

// Bubble float animation
for (var i = 1; i <= 10; i++) {
  (function(idx) {
    var delay = idx * 0.8;
    TweenMax.to("#bubble" + idx, 5 + idx * 0.4, {
      y: -650,
      x: "+=" + (10 + idx * 3),
      ease: Power0.easeNone,
      repeat: -1,
      delay: delay
    });
  })(i);
}
</script>
</body>
</html>
